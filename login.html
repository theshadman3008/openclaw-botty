<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ross AI · Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px; }
        .logo { font-size: 40px; text-align: center; margin-bottom: 12px; }
        h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: #555; text-align: center; margin-bottom: 36px; }
        label { font-size: 13px; color: #888; display: block; margin-bottom: 6px; margin-top: 16px; }
        input { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #e63946; }
        .btn { width: 100%; background: #e63946; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 28px; transition: opacity 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error { color: #e63946; font-size: 13px; margin-top: 16px; text-align: center; min-height: 20px; }
        .loading { color: #888; font-size: 13px; margin-top: 16px; text-align: center; display: none; }
        .footer { color: #333; font-size: 11px; text-align: center; margin-top: 28px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🤖</div>
    <h1>Ross AI</h1>
    <div class="subtitle">Dashboard Rassegna Tech</div>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="es. anto" autocomplete="username">
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password">
    <button class="btn" id="loginBtn">Accedi alla Dashboard</button>
    <div class="loading" id="loading">🔐 Verifica in corso...</div>
    <div class="error" id="error"></div>
    <div class="footer">Accesso riservato · Ross AI</div>
</div>
<script>
const FIREBASE_API_KEY = 'AIzaSyDac491FBUVD_O5A2u2r2r2RlWKu26u9pA';
const PROJECT_ID = 'openclaw-botty';

async function sha256hex(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const loading = document.getElementById('loading');
    const errorEl = document.getElementById('error');

    if (!username || !password) { errorEl.textContent = 'Inserisci username e password.'; return; }

    errorEl.textContent = '';
    btn.disabled = true;
    loading.style.display = 'block';

    try {
        const hash = await sha256hex(password);
        const url = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/authorized_users/${username}?key=${FIREBASE_API_KEY}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('user_not_found');
        const doc = await resp.json();
        const fields = doc.fields || {};
        const storedHash = fields.passwordHash?.stringValue || '';
        const active = fields.active?.booleanValue ?? false;
        if (!active) throw new Error('user_disabled');
        if (storedHash !== hash) throw new Error('wrong_password');
        sessionStorage.setItem('logged_in', 'true');
        sessionStorage.setItem('username', username);
        window.location.href = 'dashboard.html';
    } catch (err) {
        btn.disabled = false;
        loading.style.display = 'none';
        if (err.message === 'user_not_found' || err.message === 'wrong_password') {
            errorEl.textContent = 'Username o password non corretti.';
        } else if (err.message === 'user_disabled') {
            errorEl.textContent = 'Account disabilitato.';
        } else {
            errorEl.textContent = 'Errore di rete. Riprova.';
            console.error(err);
        }
    }
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
