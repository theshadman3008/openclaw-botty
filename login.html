<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ross AI · Accedi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #f0f2f5;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
  }

  /* Subtle mesh background */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(14,165,233,0.07) 0%, transparent 60%),
      #f0f2f5;
  }

  .card {
    position: relative; z-index: 1;
    background: #ffffff;
    border: 1px solid #e2e4ea;
    border-radius: 20px;
    padding: 48px 44px;
    width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
  }

  .logo-wrap { text-align: center; margin-bottom: 32px; }
  .logo-icon {
    width: 68px; height: 68px; border-radius: 18px;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.9rem; margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(99,102,241,0.28);
  }
  .logo-wrap h1 { font-size: 1.5rem; font-weight: 700; color: #111827; }
  .logo-wrap p { color: #6b7280; font-size: 0.88rem; margin-top: 6px; }

  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 0.8rem; color: #374151; margin-bottom: 7px; font-weight: 600; }
  input {
    width: 100%; padding: 12px 16px;
    background: #f9fafb; border: 1.5px solid #e5e7eb;
    border-radius: 10px; color: #111827; font-size: 0.95rem;
    font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    background: #fff;
  }
  input::placeholder { color: #9ca3af; }

  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    color: #fff; border: none; border-radius: 10px;
    font-size: 0.97rem; font-weight: 700; cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    margin-top: 6px;
    box-shadow: 0 4px 14px rgba(99,102,241,0.3);
  }
  .btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.38); }
  .btn:active { transform: translateY(0); }

  .error-msg {
    color: #dc2626; font-size: 0.83rem; text-align: center;
    margin-top: 14px; display: none;
    background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 8px; padding: 9px 12px;
  }

  .divider { border: none; border-top: 1px solid #f3f4f6; margin: 24px 0; }
  .footer-note { text-align: center; color: #9ca3af; font-size: 0.76rem; }
  .footer-note strong { color: #6b7280; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">🤖</div>
    <h1>Ross AI</h1>
    <p>Dashboard operativa — accesso riservato</p>
  </div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="u" placeholder="Il tuo username" autocomplete="username" onkeydown="if(event.key==='Enter') doLogin()">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="p" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
  </div>

  <button class="btn" onclick="doLogin()">Accedi →</button>
  <div class="error-msg" id="err">Credenziali errate. Riprova.</div>

  <hr class="divider">
  <div class="footer-note">Sessione valida <strong>24 ore</strong> · Powered by NextMindLab</div>
</div>

<script>
const U_HASH = '0348beb745f863940c77cc68dc7b724fd5998186f5c2ad4e72febbb6c0be0578';
const P_HASH = 'bd88fae64208b00b4c3b8d2d91a36b5d70916f4a324b225809b57422cabac9f4';

async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function setCookie(n,v,h) {
  const e = new Date(Date.now()+h*3600000).toUTCString();
  document.cookie = n+'='+v+'; expires='+e+'; path=/; SameSite=Strict';
}
function getCookie(n) {
  const m = document.cookie.match('(?:^|; )'+n+'=([^;]*)');
  return m ? m[1] : null;
}
async function doLogin() {
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  const [uh,ph] = await Promise.all([sha256(u),sha256(p)]);
  if (uh===U_HASH && ph===P_HASH) {
    setCookie('ross_session', btoa(JSON.stringify({ts:Date.now()})), 24);
    window.location.href = 'index.html';
  } else {
    const err = document.getElementById('err');
    err.style.display = 'block';
    setTimeout(()=>err.style.display='none', 3000);
  }
}
window.onload = function() {
  if (getCookie('ross_session')) window.location.href = 'index.html';
};
</script>
</body>
</html>
