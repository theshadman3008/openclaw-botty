<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ross AI Dashboard</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 48px;
            width: 100%;
            max-width: 420px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
        }
        
        .logo p {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <h1>Ross AI Dashboard</h1>
            <p>Accedi per continuare</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">Accedi</button>
        </form>
        
        <div class="footer">
            <p>Powered by Ross AI · NextMindLab</p>
        </div>
    </div>

    <script>
        // Controlla se utente è già loggato
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // Gestisci login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            // Reset error
            errorMessage.style.display = 'none';
            
            // Loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Accesso in corso...';
            
            try {
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                console.log('Login riuscito:', userCredential.user.email);
                
                // Salvataggio sessione
                localStorage.setItem('ross_session', 'active');
                
                // Redirect
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Errore login:', error.code, error.message);
                
                let errorMsg = 'Accesso fallito. Riprova.';
                if (error.code === 'auth/user-not-found') {
                    errorMsg = 'Utente non trovato.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMsg = 'Password errata.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMsg = 'Email non valida.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg = 'Troppi tentativi. Riprova più tardi.';
                }

                errorMessage.textContent = errorMsg;
                errorMessage.style.display = 'block';
                
                // Reset button
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Accedi';
            }
        });
    </script>
</body>
</html>
