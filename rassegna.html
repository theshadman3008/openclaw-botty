<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rassegna Stampa - Ross AI Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
        }
        .header {
            background: #6a5acd;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header-brand { color: white; font-size: 1.4rem; font-weight: 700; text-decoration: none; }
        .header-meta { color: rgba(255,255,255,0.75); font-size: 0.85rem; }
        .main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
        .page-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.3rem; }
        .page-sub { color: #666; font-size: 0.95rem; margin-bottom: 2rem; }
        .news-list { display: flex; flex-direction: column; gap: 1.2rem; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.4rem 1.4rem 1.4rem 1.8rem;
            border-left: 4px solid #e67e22;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
        .card-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.7rem; }
        .tag {
            display: inline-block; padding: 0.2rem 0.65rem; border-radius: 20px;
            font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
        }
        .tag-cat { background: #ede9fe; color: #6a5acd; }
        .tag-src { background: #dbeafe; color: #2563eb; }
        .card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.4; }
        .card .snippet { font-size: 0.88rem; color: #555; margin-bottom: 0.9rem; line-height: 1.5; }
        .card-meta {
            display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
            font-size: 0.8rem; color: #888;
        }
        .badge-verified {
            background: #22c55e; color: white; padding: 0.2rem 0.7rem;
            border-radius: 20px; font-size: 0.75rem; font-weight: 600;
        }
        .card-meta a {
            color: #6a5acd; text-decoration: none; font-weight: 600; font-size: 0.82rem;
        }
        .card-meta a:hover { text-decoration: underline; }
        .score-badge {
            background: #f0f0ff; color: #6a5acd;
            padding: 0.2rem 0.6rem; border-radius: 8px;
            font-weight: 700; font-size: 0.8rem;
        }
        .loading { text-align: center; padding: 4rem; color: #888; font-size: 1.1rem; }
        .error { text-align: center; padding: 3rem; color: #e74c3c; }
        .empty { text-align: center; padding: 3rem; color: #aaa; font-size: 1rem; }
        .footer { text-align: center; padding: 2rem; color: #aaa; font-size: 0.82rem; margin-top: 2rem; border-top: 1px solid #eee; }
        @media (max-width: 600px) {
            .main { padding: 0 1rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <span class="header-brand">🚀 Ross AI</span>
    <span class="header-meta" id="header-meta">Caricamento...</span>
</header>

<div class="main">
    <div class="page-title">📰 Rassegna Stampa</div>
    <p class="page-sub" id="page-sub">Notizie tech verificate dalle ultime 72 ore</p>
    <div class="news-list" id="news-list">
        <div class="loading">⏳ Caricamento notizie in corso...</div>
    </div>
</div>

<div class="footer" id="footer">Ross AI · Rassegna Stampa · Powered by GitHub Pages</div>

<script>
function categoryTag(cat) {
    return `<span class="tag tag-cat">${cat}</span>`;
}
function sourceTag(src) {
    return `<span class="tag tag-src">${src}</span>`;
}
function renderCard(n) {
    return `<div class="card">
        <div class="card-tags">
            ${categoryTag(n.category)}
            ${sourceTag(n.source)}
        </div>
        <h3>${n.title}</h3>
        <p class="snippet">${n.snippet}</p>
        <div class="card-meta">
            <span>📅 ${n.date}</span>
            <span class="badge-verified">✓ Verificato</span>
            <span class="score-badge">${n.impact_score}/100</span>
            <a href="${n.link}" target="_blank" rel="noopener">🔗 Leggi articolo completo</a>
        </div>
    </div>`;
}

fetch('data.json?v=' + Date.now())
    .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    })
    .then(data => {
        const all = data.all_news || [];
        const updated = data.last_updated || '–';

        document.getElementById('header-meta').textContent = 'Aggiornato: ' + updated;
        document.getElementById('page-sub').textContent =
            all.length + ' notizie verificate • ' + updated;
        document.getElementById('footer').textContent =
            'Ross AI · Rassegna Stampa · Ultimo aggiornamento: ' + updated;

        const list = document.getElementById('news-list');
        if (all.length === 0) {
            list.innerHTML = '<div class="empty">Nessuna notizia disponibile.</div>';
        } else {
            list.innerHTML = all.map(renderCard).join('');
        }
    })
    .catch(err => {
        document.getElementById('news-list').innerHTML =
            '<div class="error">❌ Errore nel caricamento: ' + err.message + '</div>';
    });
</script>
</body>
</html>
