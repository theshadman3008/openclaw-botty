<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ross AI · Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDac491FBUVD_O5A2u2r2r2RlWKu26u9pA",
        authDomain: "rossdb.firebaseapp.com",
        projectId: "rossdb",
        storageBucket: "rossdb.firebasestorage.app",
        messagingSenderId: "776172557370",
        appId: "1:776172557370:web:256c12b8e1fc660ea51103"
      };
      firebase.initializeApp(firebaseConfig);
    </script>
    <script src="auth-guard.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            padding: 1.5rem 2.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .header h1 { font-size: 1.8rem; color: #667eea; font-weight: 800; }
        .header .user { font-size: 0.85rem; color: #888; }
        .logout-btn {
            background: #f0f0ff; color: #667eea; border: none;
            padding: 0.5rem 1.2rem; border-radius: 8px; cursor: pointer;
            font-weight: 600; font-size: 0.85rem; transition: background 0.2s;
        }
        .logout-btn:hover { background: #667eea; color: white; }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.97);
            border-radius: 16px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex; flex-direction: column; gap: 0.7rem;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.2); }
        .card .icon { font-size: 2.5rem; }
        .card h2 { font-size: 1.2rem; color: #1a1a2e; font-weight: 700; }
        .card p { font-size: 0.88rem; color: #666; line-height: 1.5; }
        .card .arrow { color: #667eea; font-weight: 700; font-size: 0.9rem; margin-top: auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>🤖 Ross AI</h1>
            <div class="user" id="user-email">Caricamento...</div>
        </div>
        <button class="logout-btn" onclick="window.rossAuth.logout()">Esci</button>
    </div>
    <div class="cards">
        <a href="rassegna.html" class="card">
            <div class="icon">📰</div>
            <h2>Rassegna Stampa</h2>
            <p>Notizie tech verificate delle ultime 72 ore, con link agli articoli originali.</p>
            <div class="arrow">Apri →</div>
        </a>
        <a href="dashboard.html" class="card">
            <div class="icon">📊</div>
            <h2>Dashboard</h2>
            <p>Notizia top del giorno, statistiche e post LinkedIn pronto da pubblicare.</p>
            <div class="arrow">Apri →</div>
        </a>
    </div>
</div>
<script>
window.__authGuardReady.then(function(user) {
    document.getElementById('user-email').textContent = user.email;
});
</script>
</body>
</html>
